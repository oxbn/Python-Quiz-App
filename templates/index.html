<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        h1 { text-align: center; }
        .question { border: 1px solid #ddd; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
        .question p { font-weight: bold; margin-top: 0; }
        ul { list-style: none; padding-left: 0; }
        li { margin: 0.25rem 0; }
        input[type="text"] { padding: 0.4rem; width: 60%; }
        .type-label { font-size: 0.8rem; color: #888; text-transform: uppercase; }
    </style>
</head>
<body>
    <h1>Quiz</h1>

    <form action="/submit" method="post">
        {% for q in data.questions %}
        {% set qnum = loop.index %}
        <div class="question">
            <span class="type-label">
                {% if q.type == 0 %}Short Answer{% else %}Multiple Choice{% endif %}
            </span>
            <p>{{ loop.index }}. {{ q.question }}</p>

            {% if q.type == 0 %}
                <input type="text" name="q{{ loop.index }}" placeholder="Your answer">
            {% else %}
                <ul>
                    {% for option in q.options %}
                    <li>
                        <label>
                            <input type="radio" name="q{{ qnum }}" value="{{ loop.index0 }}">
                            {{ option }}
                        </label>
                    </li>
                    {% endfor %}
                </ul>
            {% endif %}
        </div>
        {% endfor %}

        <button type="submit">Submit answers</button>
    </form>
</body>
</html>
