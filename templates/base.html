<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08090f">
    <meta name="description" content="A lightweight Flask quiz app with short-answer and multiple-choice questions.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2308090f'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%237c5cff'/%3E%3C/svg%3E">
    <title>{% block title %}Quiz App{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-blobs" aria-hidden="true">
        <span class="blob blob-violet"></span>
        <span class="blob blob-cyan"></span>
    </div>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='quiz.js') }}" defer></script>
</body>
</html>
